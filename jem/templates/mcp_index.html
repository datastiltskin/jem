<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEM MCP Tools</title>
  <link rel="icon" href="/public/assets/jem-favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/public/jem-chrome.css">
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 0 auto; padding: 1rem 1.25rem 2rem; color: #111; line-height: 1.5; }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    .lead { color: #4b5563; font-size: 0.95rem; margin-bottom: 1.25rem; }
    .tool { border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; background: #fff; }
    .tool h2 { font-size: 0.95rem; margin: 0 0 4px; font-family: ui-monospace, monospace; }
    .tool p { margin: 0; font-size: 0.875rem; color: #4b5563; }
    code { font-size: 0.85em; background: #f3f4f6; padding: 1px 5px; border-radius: 3px; }
    a.json { font-size: 0.875rem; }
  </style>
</head>
<body>
  {{ jem_toolbar("mcp") }}

  <h1>MCP tools</h1>
  <p class="lead">HTTP tool registry for agents. Machine-readable listing at <a class="json" href="/mcp/tools">/mcp/tools</a> · SSE stream at <code>/mcp/sse</code>.</p>

  {% for tool in tools %}
  <div class="tool">
    <h2>{{ tool.name }}</h2>
    <p>{{ tool.description }}</p>
  </div>
  {% endfor %}
</body>
</html>
