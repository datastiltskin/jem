# jem: hand-maintained — do not regenerate
id: hc_madras
name: High Court of Judicature at Madras
abbreviation: MADR
type: ConstitutionalCourt
cluster: constitutional_courts
level_of_government: Shared_MultiState

jurisdiction_scope:
  states_covered:
    - TN
  uts_covered:
    - PY
  is_all_india: false
  jurisdiction_types:
    - Original
    - Appellate
    - Writ

created_year: 1862
operational_status: Active

constitutional_basis: "Constitution of India, Article 214 (Chapter VI — High Courts in the States)"
statutory_basis: "High Courts Act 1861; Letters Patent 1865 (Madras)"
# Letters Patent (1865) and subsequent High Courts Act define original
# civil jurisdiction. Supervisory jurisdiction: Article 227.

appointment:
  nominates: collegium_hc_appointment
  recommends: collegium_hc_appointment
  consulted:
    - governor_state
  consultation_binding: true
  formally_appoints: president_india
  criteria_public: false
  tenure: "Until age 62 (Article 217)"
  reappointment_possible: false
  removal_authority: president_india
  removal_requires_parliament: true
  removal_independent_committee: false

funding:
  primary_source: State_Consolidated_Fund
  ministry_responsible: null
  # High Courts are funded from the State Consolidated Fund of Tamil Nadu.
  # Salaries and allowances of judges are charged to CFI (Article 229 r/w
  # Article 112 / Schedule VII) — not a state discretionary grant.
  # ministry_responsible is null: no single ministry controls HC funding;
  # state Finance Dept administers the vote. Populate if a specific
  # state ministry entity is available in the graph.
  budget_figure_crore: null
  budget_year: null

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: null

complaint_mechanism:
  bias_complaint_to: []
  lokpal_jurisdiction: Not_Applicable

training:
  trained_by: []
  induction_training: false
  continuing_education: true
  training_mandatory: false

digital_infrastructure:
  system_used:
    - eCourts_Portal
    - NJDG
  digital_variant: NIC_Standard
  integrated_with_njdg: true

structural_variations: []

