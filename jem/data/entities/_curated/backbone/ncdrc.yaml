# jem: hand-maintained — do not regenerate
id: ncdrc
name: National Consumer Disputes Redressal Commission
name_hindi: राष्ट्रीय उपभोक्ता विवाद प्रतितोष आयोग
abbreviation: NCDRC
aliases:
  - National Consumer Commission
  - NCDRC

type: ConsumerCommission
cluster: consumer_redressal
# ⚠ CURSOR FIX 1 REQUIRED: change cluster to 'consumer_redressal' after
#   that value is added to CLUSTERS in validate.py and entity_schema.yaml.

level_of_government: Central

jurisdiction_scope:
  is_all_india: true
  jurisdiction_types:
    - Appellate   # appeals from State CDRCs
    - Original    # complaints where value > ₹2 crore (CPA 2019 s.58(1)(a))

created_year: 1988
# NCDRC was constituted under Consumer Protection Act 1986 (in force 24 Dec 1986);
# operationally functional from 1988. The 2019 Act (in force 20 Jul 2020) continues
# NCDRC and raises pecuniary jurisdiction. created_year is set to 1988 (first
# constitution), not 2020 (re-enactment) — entity continuity maintained.

operational_status: Active

statutory_basis: >
  Consumer Protection Act 2019, Section 53
  (orig. Consumer Protection Act 1986, Section 20 — continued by s.107 of 2019 Act)

appointment:
  # CPA 2019 s.57: President must be a sitting or retired judge of the
  # Supreme Court (appointed by Central Government in consultation with CJI).
  # Members: sitting/retired judges of HC, or persons of ability in law,
  # commerce, economics, or public administration.
  nominates: central_government
  formally_appoints: central_government
  consulted:
    - supreme_court_india   # CPA 2019 s.57(1) — CJI consultation for President
  consultation_binding: false   # statutory language: "in consultation with"
  criteria_public: true
  tenure: "5 years or until age 70, whichever is earlier (CPA 2019 s.58)"
  reappointment_possible: false   # CPA 2019 s.58(3)
  removal_authority: central_government
  removal_requires_parliament: false
  removal_independent_committee: true   # CPA 2019 s.60 — inquiry committee required

funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_consumer_affairs
  # ministry_consumer_affairs = Ministry of Consumer Affairs, Food and Public Distribution.
  # ⚠ VERIFY: confirm entity id 'ministry_consumer_affairs' exists in graph.
  # NCDRC budget flows through MoCA demand head; confirm against Union Budget
  # DDG for Ministry of Consumer Affairs (Demand No. varies by year).

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true

data_quality: partial
data_quality_notes: >
  cluster is 'tribunals_adr' as a temporary fallback — change to
  'consumer_redressal' after CURSOR FIX 1 is applied to validate.py and
  entity_schema.yaml (see flags at top of session output).
  created_year 1988 is the operational constitution date; statutory basis
  originates in CPA 1986. If entity dating policy is "earliest statute",
  set to 1986 and add a note — either is defensible; maintainer to decide.
  Appointment block is partially verified — judicial member selection criteria
  verified against CPA 2019 text; non-judicial member criteria (s.57(1)(b))
  are broadly stated and not enumerated precisely.
  funding.ministry_responsible assumes entity id 'ministry_consumer_affairs'
  — verify this id exists in graph before merging.
  case_volume and judge_strength left null; populate from NCDRC Annual Report
  or DoJ vacancy data in a separate §3 / §7 pass.

sources:
  - label: "Consumer Protection Act 2019 — India Code"
    url: https://india-code.nic.in/acts-detail/MjMxMzM=
    type: CentralAct
    accessed_date: '2026-05-18'
  - label: "Consumer Protection Act 1986 — India Code (origin statute)"
    url: https://india-code.nic.in/acts-detail/NzQ3
    type: CentralAct
    accessed_date: '2026-05-18'
  - label: "Ministry of Consumer Affairs — NCDRC (official page)"
    url: https://consumeraffairs.nic.in/ncdrc
    type: GoIWebsite
    accessed_date: '2026-05-18'