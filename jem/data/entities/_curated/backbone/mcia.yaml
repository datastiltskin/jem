# ── MCIA — §4 ADR/Arbitration ────────────────────────────────────────────────
# New entity. Non-statutory private institution — no CentralAct basis.
# funding.primary_source = Party_Fees; ministry_responsible = null.
# ─────────────────────────────────────────────────────────────────────────────

# jem: hand-maintained — do not regenerate
id: mcia
name: Mumbai Centre for International Arbitration
abbreviation: MCIA
aliases:
  - Mumbai Centre for International Arbitration

type: ArbitralInstitution
cluster: arbitration
level_of_government: State
# MCIA is based in Maharashtra; jurisdiction aspirationally international
# but no all-India statutory mandate. level_of_government: State reflects
# its incorporation jurisdiction, not its case scope.

jurisdiction_scope:
  states_covered:
    - MH
  is_all_india: false
  jurisdiction_types:
    - Original   # institutional arbitration only

created_year: 2016
# MCIA incorporated in 2016 as a not-for-profit company under Companies
# Act 2013; supported by Government of Maharashtra and industry bodies
# (FICCI, CII, ASSOCHAM). First set of MCIA Rules published 2016.
# ⚠ VERIFY: exact incorporation date from MCA/Registrar of Companies.

operational_status: Active

statutory_basis: null
# Non-statutory body. Established under Companies Act 2013 as an
# incorporated entity. Operates under Arbitration and Conciliation
# Act 1996 (governing law for arbitrations administered under its rules).

appointment:
  # MCIA Council: appointed by founding/member institutions.
  # No statutory appointment procedure; governed by MCIA Articles of
  # Association and Council rules.
  # Arbitrator appointment: MCIA Rules 2016 (as amended) — parties appoint;
  # MCIA Council appoints in default.
  nominates: null   # non-statutory; governing documents apply
  formally_appoints: null
  consulted: []
  consultation_binding: null
  criteria_public: true   # MCIA publishes arbitrator empanelment criteria
  tenure: null
  reappointment_possible: null
  removal_authority: null
  removal_requires_parliament: false
  removal_independent_committee: false

funding:
  primary_source: Party_Fees
  ministry_responsible: null
  # Non-government funded. Revenue from registration fees, case
  # administration fees, arbitrator appointment fees (per MCIA Schedule
  # of Fees). Government of Maharashtra provided seed support at founding
  # but MCIA is operationally self-sustaining.

audit:
  audited_by: null
  audit_type: Internal
  # Statutory audit under Companies Act 2013 (as a company); not CAG.
  audit_report_public: false

complaint_mechanism:
  # Arbitrator challenge: MCIA Rules 2016, Rule 14 (Challenge Procedure)
  # — challenge decided by MCIA Council.
  # Award challenge: A&C Act 1996 s.34 — Bombay High Court (seat in Mumbai).
  lokpal_jurisdiction: Not_Applicable
  removal_mechanism: >
    Arbitrator challenge under MCIA Rules 2016, Rule 14. Award challenge
    under Arbitration and Conciliation Act 1996, s.34 in Bombay High Court.

data_quality: partial
data_quality_notes: >
  Non-statutory body; data_quality partial throughout.
  created_year 2016 from incorporation records — verify exact date from
  MCA Registrar of Companies (Mumbai). MCIA Rules 2016 updated periodically;
  current version (2024?) should be cited once confirmed.
  level_of_government State (MH) reflects incorporation; MCIA handles
  international arbitrations outside Maharashtra — consider Shared_MultiState
  or Central if scope classification policy changes.
  No CAG audit; audit_type Internal (Companies Act 2013 statutory auditor).
  AwardChallengedIn → hc_bombay (adr_arbitration_relationships.yaml; default seat).
  ministry_responsible null — non-government body.

sources:
  - label: "MCIA — Official Website"
    url: https://www.mcia.world
    type: GoIWebsite
    accessed_date: '2026-05-18'
  - label: "Arbitration and Conciliation Act 1996 — India Code (governing law)"
    url: https://india-code.nic.in/acts-detail/MTA4NDE=
    type: CentralAct
    accessed_date: '2026-05-18'