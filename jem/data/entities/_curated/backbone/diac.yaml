    url: https://diac.in
    type: GoIWebsite
    accessed_date: '2026-05-18'
  - label: "Arbitration and Conciliation Act 1996 — India Code (governing law)"
    url: https://india-code.nic.in/acts-detail/MTA4NDE=
    type: CentralAct
    accessed_date: '2026-05-18'