data_quality: partial
data_quality_notes: >-
  Generic node for officers designated under FEMA s.16. In practice, officers
  of the Enforcement Directorate (Department of Revenue, MoF) are routinely
  designated; ED is the investigating agency but adjudication is a separate
  quasi-judicial function. Do not conflate ED investigation with adjudicating
  authority orders. Special Director penalties (s.37) follow s.18 appeal route
  to ATFE — same tribunal, distinct statutory gateway.
