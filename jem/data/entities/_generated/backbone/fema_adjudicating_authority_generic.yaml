constitutional_basis: null
statutory_basis: >-
  Foreign Exchange Management Act 1999, s.16 — Central Government may appoint
  officers of the Central Government as adjudicating authorities for holding
  inquiries into contraventions under Chapter IV. Orders of the adjudicating
  authority are appealable to the Appellate Tribunal under s.17. Penalties
  imposed by the Special Director under s.37 are separately appealable to the
  same Tribunal under s.18.
