statutory_basis: >-
  Foreign Exchange Management Act 1999, s.37 — Special Director (Director of
  Enforcement or other officer authorised by Central Government) may impose
  penalty for contravention under Chapter IV. s.18 — any person aggrieved by
  an order of the Special Director may appeal to the Appellate Tribunal (ATFE).
