    url: https://india-code.nic.in/acts-detail/MjMyMDM=
    type: CentralAct
    accessed_date: '2026-05-18'
  - label: "Ministry of Law and Justice — NDIAC"
    url: https://doj.gov.in/acts-rules/new-delhi-international-arbitration-centre-act-2019
    type: GoIWebsite
