data_quality_notes: >-
  Rollup placeholder for upstream appellate authorities listed in NGT Act 2010
  s.16. NGT also exercises original jurisdiction under s.14 — not modelled on
  this edge. Per-Act appellate bodies (e.g. under Water Act s.28) should be
  split into dedicated entities when state/central packs are enriched.
