created_year: 2010
operational_status: Active
constitutional_basis: null
statutory_basis: >-
  National Green Tribunal Act 2010, s.16 — any person aggrieved by an order or
  decision of the appellate authority under the Water (Prevention and Control of
  Pollution) Act 1974, the Water (Prevention and Control of Pollution) Cess Act
  1977, the Forest (Conservation) Act 1980, the Air (Prevention and Control of
  Pollution) Act 1981, the Environment (Protection) Act 1986, the Public
  Liability Insurance Act 1991, or the Biological Diversity Act 2002, may appeal
  to the National Green Tribunal. Generic rollup node pending per-Act appellate
  authority entities.
