id: environmental_appellate_authority_generic
name: Environmental Statutory Appellate Authority (Generic)
name_hindi: पर्यावरणीय वैधानिक अपीलीय प्राधिकारी (सामान्य)
abbreviation: Env Appellate Auth
aliases:
