# JEM — governance structure (ministers, ministries, state executives)
# Personnel ↔ department links; not appointment or appellate chains.

relationships:

  - id: rel_minister_home_heads_mha
    source: minister_home_affairs
    target: ministry_home_affairs
    relationship_type: PolicyOversight
    relationship_category: statutory_ref
    is_binding: true
    is_constitutional: false
    statutory_basis: "Government of India (Allocation of Business) Rules"
    year_established: 1947
    notes: >
      Union Minister of Home Affairs heads and is responsible for the
      Ministry of Home Affairs. Distinct from PHRA/CVC consultation role
      (minister as committee member, not ministry as member).
    data_quality: partial
    sources:
      - label: Constitution of India — Articles 74–75
        url: https://www.indiacode.nic.in/handle/123456789/1
        type: Constitution
        accessed_date: "2026-05-19"

  - id: rel_pm_cabinet_oversees_mha_minister
    source: prime_minister
    target: minister_home_affairs
    relationship_type: PolicyOversight
    relationship_category: statutory_ref
    is_binding: true
    is_constitutional: false
    statutory_basis: "Constitution of India, Articles 74–75"
    year_established: 1950
    notes: >
      Prime Minister chairs the Union Cabinet; Home Minister holds portfolio
      at PM's pleasure. Cabinet allocates business to ministries.
    data_quality: partial
    sources:
      - label: Constitution of India — Articles 74–75
        url: https://www.indiacode.nic.in/handle/123456789/1
        type: Constitution
        accessed_date: "2026-05-19"
